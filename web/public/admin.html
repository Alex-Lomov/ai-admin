<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snap AI - Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 20px; font-weight: 700; color: #6366f1; }
    .badge {
      background: #6366f1;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .user-name { color: #999; font-size: 14px; }
    .nav-link { color: #999; text-decoration: none; font-size: 14px; }
    .nav-link:hover { color: #fff; }
    .logout-btn {
      background: none;
      border: 1px solid #333;
      color: #999;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .logout-btn:hover { border-color: #555; color: #fff; }
    .container { max-width: 1100px; margin: 32px auto; padding: 0 24px; }
    .tabs { display: flex; gap: 4px; margin-bottom: 24px; }
    .tab {
      padding: 10px 24px;
      background: #1a1a1a;
      border: none;
      color: #999;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px 8px 0 0;
      transition: color 0.2s, background 0.2s;
    }
    .tab.active { background: #252525; color: #fff; }
    .tab:hover { color: #fff; }
    .panel { display: none; }
    .panel.active { display: block; }
    .toolbar { display: flex; justify-content: flex-end; margin-bottom: 16px; }
    .btn {
      padding: 8px 18px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: #5558e6; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-outline {
      background: none;
      border: 1px solid #333;
      color: #ccc;
    }
    .btn-outline:hover { border-color: #6366f1; color: #6366f1; background: none; }
    .btn-danger { background: #dc2626; }
    .btn-danger:hover { background: #b91c1c; }
    table { width: 100%; border-collapse: collapse; background: #1a1a1a; border-radius: 10px; overflow: hidden; }
    th { text-align: left; padding: 12px 16px; color: #666; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #2a2a2a; }
    td { padding: 12px 16px; border-bottom: 1px solid #1f1f1f; font-size: 14px; }
    tr:last-child td { border-bottom: none; }
    .status-active { color: #22c55e; }
    .status-disabled { color: #ef4444; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal h2 { margin-bottom: 20px; font-size: 20px; }
    .modal label { display: block; font-size: 13px; color: #999; margin-bottom: 4px; }
    .modal input[type="text"],
    .modal input[type="email"],
    .modal input[type="password"] {
      width: 100%;
      padding: 10px;
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      margin-bottom: 14px;
      outline: none;
    }
    .modal input:focus { border-color: #6366f1; }
    .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .checkbox-row input { width: auto; margin: 0; }
    .checkbox-row label { margin: 0; color: #ccc; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
    .modal-actions .btn-cancel {
      padding: 8px 18px;
      background: #333;
      color: #ccc;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .access-list { margin-top: 12px; }
    .access-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
    }
    .access-item input { width: auto; }
    .access-item label { color: #ccc; font-size: 14px; margin: 0; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <div class="logo">Snap AI</div>
      <span class="badge">Admin</span>
    </div>
    <div class="nav-right">
      <a href="/dashboard" class="nav-link">Dashboard</a>
      <span class="user-name" id="userName"></span>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <div class="container">
    <div class="tabs">
      <button class="tab active" data-tab="users">Users</button>
      <button class="tab" data-tab="projects">Projects</button>
    </div>

    <!-- Users Panel -->
    <div class="panel active" id="usersPanel">
      <div class="toolbar">
        <button class="btn" id="addUserBtn">Add User</button>
      </div>
      <table>
        <thead>
          <tr><th>Name</th><th>Email</th><th>Slack</th><th>Role</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="usersBody"></tbody>
      </table>
    </div>

    <!-- Projects Panel -->
    <div class="panel" id="projectsPanel">
      <div class="toolbar">
        <button class="btn" id="addProjectBtn">Add Project</button>
      </div>
      <table>
        <thead>
          <tr><th>Name</th><th>Subdomain</th><th>URL</th></tr>
        </thead>
        <tbody id="projectsBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Add User Modal -->
  <div class="modal-overlay" id="userModal">
    <div class="modal">
      <h2>Add User</h2>
      <form id="userForm">
        <label>Name</label>
        <input type="text" name="name" required>
        <label>Email</label>
        <input type="email" name="email" required>
        <label>Password</label>
        <input type="password" name="password" required>
        <label>Slack Username</label>
        <input type="text" name="slack_username">
        <div class="checkbox-row">
          <input type="checkbox" name="is_admin" id="isAdminCheck">
          <label for="isAdminCheck">Admin</label>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" onclick="closeModal('userModal')">Cancel</button>
          <button type="submit" class="btn">Create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add Project Modal -->
  <div class="modal-overlay" id="projectModal">
    <div class="modal">
      <h2>Add Project</h2>
      <form id="projectForm">
        <label>Name</label>
        <input type="text" name="name" required>
        <label>Subdomain</label>
        <input type="text" name="subdomain" required>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" onclick="closeModal('projectModal')">Cancel</button>
          <button type="submit" class="btn">Create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Reset Password Modal -->
  <div class="modal-overlay" id="resetModal">
    <div class="modal">
      <h2>Reset Password</h2>
      <form id="resetForm">
        <input type="hidden" name="userId" id="resetUserId">
        <label>New Password</label>
        <input type="password" name="password" required>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" onclick="closeModal('resetModal')">Cancel</button>
          <button type="submit" class="btn">Reset</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Manage Access Modal -->
  <div class="modal-overlay" id="accessModal">
    <div class="modal">
      <h2>Manage Access — <span id="accessUserName"></span></h2>
      <div class="access-list" id="accessList"></div>
      <div class="modal-actions" style="margin-top:16px">
        <button type="button" class="btn-cancel" onclick="closeModal('accessModal')">Close</button>
      </div>
    </div>
  </div>

  <script>
    let allProjects = [];

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + 'Panel').classList.add('active');
      });
    });

    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    // Close modals on overlay click
    document.querySelectorAll('.modal-overlay').forEach(el => {
      el.addEventListener('click', (e) => { if (e.target === el) el.classList.remove('active'); });
    });

    // Load user info
    async function loadMe() {
      const res = await fetch('/api/me');
      if (res.status === 401) return window.location.href = '/login';
      const me = await res.json();
      if (!me.is_admin) return window.location.href = '/dashboard';
      document.getElementById('userName').textContent = me.name;
    }

    // Load users
    async function loadUsers() {
      const res = await fetch('/api/admin/users');
      const users = await res.json();
      document.getElementById('usersBody').innerHTML = users.map(u => `
        <tr>
          <td>${esc(u.name)}</td>
          <td>${esc(u.email)}</td>
          <td>${esc(u.slack_username) || '—'}</td>
          <td>${u.is_admin ? 'Admin' : 'User'}</td>
          <td class="${u.is_active ? 'status-active' : 'status-disabled'}">${u.is_active ? 'Active' : 'Disabled'}</td>
          <td>
            <div class="actions">
              <button class="btn btn-sm btn-outline" onclick="toggleUser(${u.id})">${u.is_active ? 'Disable' : 'Enable'}</button>
              <button class="btn btn-sm btn-outline" onclick="openReset(${u.id})">Reset PW</button>
              <button class="btn btn-sm btn-outline" onclick="openAccess(${u.id}, '${esc(u.name)}')">Access</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    // Load projects
    async function loadProjects() {
      const res = await fetch('/api/admin/projects');
      allProjects = await res.json();
      document.getElementById('projectsBody').innerHTML = allProjects.map(p => `
        <tr>
          <td>${esc(p.name)}</td>
          <td>${esc(p.subdomain)}</td>
          <td><a href="${esc(p.url)}" target="_blank" style="color:#6366f1">${esc(p.url)}</a></td>
        </tr>
      `).join('');
    }

    // Toggle user active
    async function toggleUser(id) {
      await fetch(`/api/admin/users/${id}/disable`, { method: 'POST' });
      loadUsers();
    }

    // Reset password
    function openReset(id) {
      document.getElementById('resetUserId').value = id;
      document.getElementById('resetForm').querySelector('input[name="password"]').value = '';
      openModal('resetModal');
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      await fetch(`/api/admin/users/${fd.get('userId')}/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: fd.get('password') })
      });
      closeModal('resetModal');
    });

    // Manage access
    async function openAccess(userId, name) {
      document.getElementById('accessUserName').textContent = name;
      const res = await fetch(`/api/admin/users/${userId}/projects`);
      const assigned = await res.json();
      const assignedIds = new Set(assigned.map(p => p.id));

      document.getElementById('accessList').innerHTML = allProjects.map(p => `
        <div class="access-item">
          <input type="checkbox" id="access_${p.id}" ${assignedIds.has(p.id) ? 'checked' : ''}
            onchange="toggleAccess(${userId}, ${p.id}, this.checked)">
          <label for="access_${p.id}">${esc(p.name)} (${esc(p.subdomain)})</label>
        </div>
      `).join('') || '<div style="color:#666">No projects created yet</div>';
      openModal('accessModal');
    }

    async function toggleAccess(userId, projectId, checked) {
      if (checked) {
        await fetch(`/api/admin/users/${userId}/projects`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ project_id: projectId })
        });
      } else {
        await fetch(`/api/admin/users/${userId}/projects/${projectId}`, { method: 'DELETE' });
      }
    }

    // Add user
    document.getElementById('addUserBtn').addEventListener('click', () => {
      document.getElementById('userForm').reset();
      openModal('userModal');
    });

    document.getElementById('userForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const res = await fetch('/api/admin/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: fd.get('name'),
          email: fd.get('email'),
          password: fd.get('password'),
          slack_username: fd.get('slack_username'),
          is_admin: fd.get('is_admin') === 'on'
        })
      });
      if (res.ok) {
        closeModal('userModal');
        loadUsers();
      } else {
        const data = await res.json();
        alert(data.error);
      }
    });

    // Add project
    document.getElementById('addProjectBtn').addEventListener('click', () => {
      document.getElementById('projectForm').reset();
      openModal('projectModal');
    });

    document.getElementById('projectForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const res = await fetch('/api/admin/projects', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: fd.get('name'),
          subdomain: fd.get('subdomain')
        })
      });
      if (res.ok) {
        closeModal('projectModal');
        loadProjects();
      } else {
        const data = await res.json();
        alert(data.error);
      }
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      const res = await fetch('/logout', { method: 'POST' });
      const data = await res.json();
      window.location.href = data.redirect;
    });

    // Init
    loadMe();
    loadUsers();
    loadProjects();
  </script>
</body>
</html>
